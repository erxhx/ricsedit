<!-- Structured data: FAQPage (must mirror visible Visit panel FAQ exactly) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "@id": "https://editstudio.space/#faq",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "How do I book?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Swipe left and right across the screen to move between services — Barbering, Sunless, Waxing. On any service, pull down (or scroll) to see the full menu, gallery, and the booking calendar. Or tap the \"Book now\" button at the bottom of the screen to jump straight to scheduling."
      }
    },
    {
      "@type": "Question",
      "name": "Do you take walk-ins?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Occasionally, when the room allows. Booking is the safer bet, as we fill up quite quickly."
      }
    },
    {
      "@type": "Question",
      "name": "What's your cancellation policy?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Life happens — we get it. If something comes up, just give us a call or text as soon as you can so we can offer the spot to someone on the waitlist. No fees for the occasional cancel or reschedule. Repeated no-shows will result in a deposit or full charge on future bookings."
      }
    },
    {
      "@type": "Question",
      "name": "Are you accessible?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Our entry is three steps down, with a small concrete ramp running alongside the stairs. Once inside, both the barber chair and the waxing room are accessible. If you'd like a hand or want to chat through the layout before your visit, just give us a call."
      }
    },
    {
      "@type": "Question",
      "name": "Do you offer gift cards?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes — gift cards are available in-store. Drop by during opening hours and we'll set you up."
      }
    },
    {
      "@type": "Question",
      "name": "Where do I park?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Free street parking is available right outside the studio on Oak Bay Avenue."
      }
    }
  ]
}
</script>
